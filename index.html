<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajer Foto Produk</title>
    <!-- Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Identity Services (OAuth) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* Animasi loading sederhana */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        .loader-dark {
            border-top: 3px solid #4f46e5;
            border-right: 3px solid rgba(79, 70, 229, 0.2);
            border-bottom: 3px solid rgba(79, 70, 229, 0.2);
            border-left: 3px solid rgba(79, 70, 229, 0.2);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Hide scrollbar untuk tampilan mobile yang lebih rapi */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-20 selection:bg-indigo-200 selection:text-indigo-900">

    <!-- Header dengan Gradasi Premium -->
    <header class="bg-gradient-to-r from-blue-700 via-indigo-700 to-violet-800 sticky top-0 z-20 shadow-lg shadow-indigo-900/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-5 flex flex-col md:flex-row justify-between items-center gap-5">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="bg-white/20 backdrop-blur-md p-3 rounded-2xl text-white shadow-inner border border-white/20">
                    <i data-lucide="camera" class="w-7 h-7"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-white tracking-tight">Katalog<span class="text-indigo-200">Foto</span></h1>
                    <div class="flex flex-wrap items-center gap-2 mt-1.5">
                        <!-- Status Login Auth -->
                        <button id="authStatusBtn" onclick="handleAuthClick()" class="flex items-center gap-1.5 text-[11px] font-bold bg-white/10 text-white px-3 py-1 rounded-full border border-white/20 hover:bg-white/20 transition-all backdrop-blur-sm shadow-sm">
                            <i data-lucide="log-in" class="w-3.5 h-3.5"></i> Login Drive
                        </button>
                        <!-- Sinkronisasi Drive Antar Perangkat -->
                        <button id="btnSyncDrive" onclick="syncDrivePhotos()" class="flex items-center gap-1.5 text-[11px] font-bold bg-white/10 text-indigo-100 px-3 py-1 rounded-full border border-white/20 hover:bg-white/20 transition-all backdrop-blur-sm shadow-sm" title="Tarik foto dari Cloud Drive untuk menyamakan data antar HP/Laptop">
                            <i data-lucide="cloud-download" class="w-3.5 h-3.5"></i> Tarik Foto
                        </button>
                        <!-- Refresh Data G-Sheets -->
                        <button id="btnRefreshData" onclick="refreshData()" class="flex items-center gap-1.5 text-[11px] font-bold bg-amber-500/20 text-amber-100 px-3 py-1 rounded-full border border-amber-400/30 hover:bg-amber-500/30 transition-all backdrop-blur-sm shadow-sm" title="Muat ulang data produk dari Google Sheets">
                            <i data-lucide="rotate-cw" class="w-3.5 h-3.5"></i> Refresh
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="relative w-full md:w-96 group">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Cari SKU, Nama Produk, atau Merk..."
                    class="w-full pl-12 pr-4 py-3.5 bg-white/10 backdrop-blur-md border border-white/20 focus:bg-white focus:text-slate-900 focus:border-white text-white placeholder-indigo-200 rounded-2xl outline-none transition-all shadow-inner font-medium"
                    onkeyup="handleSearch()"
                />

            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 mt-8">
        
        <!-- Filter Tabs (Pill Style) -->
        <div class="flex flex-col gap-3 mb-8">
            <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2 items-center">
                <button id="tabAll" onclick="switchTab('all')" class="shrink-0 px-6 py-2.5 bg-slate-800 text-white rounded-full text-sm font-bold shadow-md shadow-slate-900/10 hover:-translate-y-0.5 transition-all">Semua Produk</button>
                <button id="tabTasks" onclick="switchTab('tasks')" class="shrink-0 px-6 py-2.5 bg-white text-slate-600 border border-slate-200 rounded-full text-sm font-bold hover:bg-slate-50 hover:-translate-y-0.5 transition-all flex items-center gap-2 shadow-sm">

                    <i data-lucide="cloud-upload" class="w-4 h-4"></i> Simpan List ke Sheet

        <!-- Error Message Container -->

        <!-- List/Table Container -->

            <!-- Body List (Card Based Responsive) -->

                <!-- Loading State -->

                    <div class="loader loader-dark mb-4"></div>
                    <p class="font-semibold text-indigo-900/60 animate-pulse">Menarik data pintar Anda...</p>
                </div>
            </div>
            
            <!-- Footer / Pagination -->
            <div class="mt-8 px-2 flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3 w-full md:w-auto justify-between bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
                    <span id="productCountInfo" class="text-xs font-semibold text-slate-500 px-3">Menampilkan 0 produk</span>
                    <select id="itemsPerPageSelect" onchange="changeItemsPerPage(this.value)" class="bg-slate-50 border-none text-slate-700 py-2 px-4 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm cursor-pointer hover:bg-slate-100 transition-colors">

                        <option value="20">20 / hal</option>

                        <option value="100">100 / hal</option>

                <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">

    <!-- Modal Kamera / Upload -->
    <div id="cameraModal" class="fixed inset-0 z-50 hidden flex items-end md:items-center justify-center bg-slate-900/40 backdrop-blur-md transition-opacity">
        <div class="bg-white rounded-t-3xl md:rounded-3xl shadow-2xl shadow-indigo-900/20 w-full max-w-md overflow-hidden transform transition-transform translate-y-full md:translate-y-0 flex flex-col max-h-[90vh]" id="modalContent">
            
            <div class="flex justify-between items-center p-5 border-b border-slate-100 shrink-0 bg-white">
                <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">Kelola Foto</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 bg-slate-50 hover:bg-red-50 p-2 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 no-scrollbar bg-slate-50/50">
                <!-- Info Target -->
                <div class="mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-4 items-center">
                    <div class="bg-indigo-50 p-3 rounded-xl">
                        <i data-lucide="folder-open" class="w-6 h-6 text-indigo-600"></i>
                    </div>
                    <div>
                        <div class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Target Penyimpanan</div>
                        <div id="modalSkuLabel" class="text-sm font-bold text-slate-700 bg-slate-100 px-2.5 py-0.5 rounded-md inline-block border border-slate-200"></div>

                </div>

                <!-- Area Preview & Tombol Kamera -->
                <div class="mb-8">
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple class="hidden" onchange="handlePhotoCapture(event)">
                    
                    <div class="flex justify-between items-end mb-4 px-1">
                        <div>
                            <label class="block text-sm font-extrabold text-slate-800">Daftar Foto</label>
                            <p class="text-[11px] font-medium text-slate-500 mt-0.5"><span id="photoCountLabel" class="text-indigo-600 font-bold">0</span> dari 5 Slot Terisi</p>
                        </div>
                        <button id="btnTambahFotoMini" onclick="openCamera()" class="text-xs font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 hover:shadow-sm px-3 py-2 rounded-xl flex items-center gap-1.5 transition-all">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i> Tambah
                        </button>
                    </div>

                    <!-- Grid Preview -->
                    <div id="previewGrid" class="grid grid-cols-3 gap-3 mb-4 hidden">
                        <!-- Thumnails masuk kesini -->
                    </div>
                    
                    <p id="deleteInfoText" class="text-[11px] text-rose-500 font-medium hidden mb-5 bg-rose-50/50 p-3 rounded-xl border border-rose-100 flex items-start gap-2">
                        <i data-lucide="info" class="w-4 h-4 shrink-0 mt-0.5"></i>
                        Hapus foto via ikon tong sampah akan menghapusnya permanen dari Google Drive.
                    </p>

                    <!-- State Kosong -->
                    <div id="emptyStateContainer" class="w-full aspect-video mb-5 rounded-3xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center bg-white hover:bg-slate-50 transition-colors gap-3 cursor-pointer" onclick="openCamera()">
                        <div class="bg-indigo-50 text-indigo-500 p-4 rounded-full">
                            <i data-lucide="camera" class="w-8 h-8"></i>
                        </div>
                        <p class="text-sm text-slate-500 font-bold">Tap untuk Ambil Foto</p>
                    </div>

                    <button id="btnOpenCamera" onclick="openCamera()" class="w-full flex justify-center items-center gap-2 py-4 px-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-bold transition-all shadow-lg shadow-slate-900/20 hover:-translate-y-0.5">
                        <i data-lucide="camera" class="w-5 h-5"></i>
                        Buka Kamera / Galeri
                    </button>
                </div>

                <!-- Tombol Simpan -->
                <div id="successMessage" class="hidden flex items-center justify-center gap-2 text-emerald-700 bg-emerald-50 p-4 rounded-2xl border border-emerald-200 font-bold mb-5 shadow-sm">
                    <i data-lucide="check-circle-2" class="w-5 h-5"></i> Tersimpan ke Drive!
                </div>

                <button
                    id="btnUpload"
                    onclick="handleUploadClick()"
                    disabled
                    class="w-full flex justify-center items-center gap-2 py-4 px-4 border border-transparent rounded-2xl shadow-lg text-sm font-bold text-white bg-gradient-to-r from-indigo-500 to-blue-600 disabled:from-slate-300 disabled:to-slate-300 disabled:text-slate-500 disabled:shadow-none disabled:cursor-not-allowed transition-all shrink-0 hover:-translate-y-0.5 hover:shadow-indigo-500/30"
                >
                    <i data-lucide="cloud-upload" class="w-5 h-5"></i>

        </div>

    <!-- Photo Popup Modal (Untuk memperbesar foto & Slider) -->
    <div id="photoPopupModal" class="fixed inset-0 z-[60] hidden flex flex-col bg-slate-900/95 backdrop-blur-xl transition-opacity" onclick="closePhotoPopup()">
        <div class="flex justify-between items-center p-5 text-white shrink-0" onclick="event.stopPropagation()">
            <div id="popupTitle" class="font-bold text-sm bg-white/10 px-4 py-2 rounded-xl border border-white/10 backdrop-blur-md">SKU_1.png</div>
            <button onclick="closePhotoPopup()" class="text-white hover:text-red-400 bg-white/10 hover:bg-white/20 p-2.5 rounded-full transition-colors backdrop-blur-md">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>
        
        <div class="flex-1 relative flex justify-center items-center overflow-hidden px-4" onclick="event.stopPropagation()">
            <img id="zoomedPhoto" src="" alt="Zoomed Photo" class="max-h-full max-w-full object-contain drop-shadow-2xl transition-transform duration-300 rounded-xl">
            
            <button id="btnPopupPrev" onclick="navPopup(-1)" class="absolute left-4 md:left-10 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/70 text-white p-3.5 rounded-full backdrop-blur-md transition-all shadow-xl border border-white/10 hover:scale-110">
                <i data-lucide="chevron-left" class="w-7 h-7"></i>
            </button>
            <button id="btnPopupNext" onclick="navPopup(1)" class="absolute right-4 md:right-10 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/70 text-white p-3.5 rounded-full backdrop-blur-md transition-all shadow-xl border border-white/10 hover:scale-110">
                <i data-lucide="chevron-right" class="w-7 h-7"></i>
            </button>
        </div>

        <div class="p-6 text-center shrink-0" onclick="event.stopPropagation()">
            <span id="popupCounter" class="text-sm font-bold text-white bg-white/10 px-5 py-2 rounded-full backdrop-blur-md border border-white/10 shadow-lg">1 / 1</span>
        </div>
    </div>

    <script>
        // --- Konfigurasi ---
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8ACyi03DJ77mANO19x_hJV82Xs8rNBBLyT9IIGc1tgYGNrv9WMufjm940iEPx4QU6Eta6T8Ekv2-X/pub?gid=1285691610&single=true&output=csv';
        const TASK_CSV_URL = 'https://docs.google.com/spreadsheets/d/1LhlFxhO9nbrRanJkuRsx_iRtMfvp5f4g8AFaDSIyOsg/export?format=csv';
        
        // --- Konfigurasi Google API (OAuth2 Langsung) ---
        const CLIENT_ID = '482253857327-8jp0c75kqp27t333csghk6ldj1o6fm1c.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.readonly';
        const DRIVE_FOLDER_ID = '1Ozwm3WQO_7fST6Jsla0KtmXzz4DeW6lG';
        const TASK_SHEET_ID = '1LhlFxhO9nbrRanJkuRsx_iRtMfvp5f4g8AFaDSIyOsg';
        
        let tokenClient;
        let accessToken = null;
        
        // --- State Global ---
        let allProducts = [];
        let filteredProductsList = []; 
        let localPhotos = {}; // Menyimpan ARRAY Base64/URL: { "SKU123": ["base64...", "base64..."] }
        
        let currentActiveSku = null;
        let currentActivePhotos = []; 
        const MAX_PHOTOS = 5;
        
        let activeTab = 'all'; 
        let dailyTasks = new Set(JSON.parse(localStorage.getItem('dailyTasks') || '[]')); 
        
        let currentPage = 1;
        let itemsPerPage = 10;
        let popupSku = null;
        let popupIndex = 0;

        // --- IndexedDB Setup (Penyimpanan Lokal Permanen) ---
        const DB_NAME = 'PhotoManagerDB';
        const STORE_NAME = 'photos';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = (event) => reject(event.target.error);
                request.onsuccess = (event) => resolve(event.target.result);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
            });
        }

        async function savePhotosToDB(sku, photosBase64Array) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put(photosBase64Array, sku);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function deletePhotosFromDB(sku) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(sku);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function clearAllPhotosFromDB() {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.clear();
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function loadAllPhotosFromDB() {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                const keysRequest = store.getAllKeys();

                request.onsuccess = () => {
                    keysRequest.onsuccess = () => {
                        const result = {};
                        keysRequest.result.forEach((key, i) => {
                            result[key] = request.result[i];
                        });
                        resolve(result);
                    };
                };
                request.onerror = () => reject(request.error);
            });
        }

        // --- Inisialisasi ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            updateTaskBadge();
            
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        
                        const expiresIn = tokenResponse.expires_in || 3599;
                        const expiresAt = Date.now() + expiresIn * 1000;
                        localStorage.setItem('driveAccessToken', accessToken);
                        localStorage.setItem('driveTokenExpiresAt', expiresAt);
                        
                        updateAuthStatus(true);
                    }
                },
            });

            const savedToken = localStorage.getItem('driveAccessToken');
            const tokenExpiry = localStorage.getItem('driveTokenExpiresAt');
            if (savedToken && tokenExpiry && Date.now() < parseInt(tokenExpiry)) {
                accessToken = savedToken;
                updateAuthStatus(true);
            } else {
                localStorage.removeItem('driveAccessToken');
                localStorage.removeItem('driveTokenExpiresAt');
            }

            fetchData();

            loadAllPhotosFromDB().then(photos => {
                localPhotos = photos;
                if(filteredProductsList.length > 0) renderPage(); 
            }).catch(error => {
                console.error("Gagal memuat foto lokal:", error);
            });
        });

        function handleApiError(response) {
            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('driveAccessToken');
                localStorage.removeItem('driveTokenExpiresAt');
                accessToken = null;
                updateAuthStatus(false);
                throw new Error("Sesi Google berakhir. Klik tombol 'Login Drive' kembali.");
            }
        }

        // --- Google API Handlers (Drive Sync & OAuth) ---
        function handleAuthClick() {
            tokenClient.requestAccessToken({prompt: ''});
        }

        function updateAuthStatus(isConnected) {
            const btn = document.getElementById('authStatusBtn');
            if(isConnected && btn) {
                btn.innerHTML = '<i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Terhubung';
                btn.classList.replace('bg-white/10', 'bg-emerald-500/20');
                btn.classList.replace('text-white', 'text-emerald-100');
                btn.classList.replace('border-white/20', 'border-emerald-400/30');
                btn.onclick = null; 
            } else if (!isConnected && btn) {
                btn.innerHTML = '<i data-lucide="log-in" class="w-3.5 h-3.5"></i> Login Drive';
                btn.classList.replace('bg-emerald-500/20', 'bg-white/10');
                btn.classList.replace('text-emerald-100', 'text-white');
                btn.classList.replace('border-emerald-400/30', 'border-white/20');
                btn.onclick = handleAuthClick;
            }
            lucide.createIcons();
        }

        async function syncDrivePhotos() {
            if (!accessToken) {
                tokenClient.callback = async (resp) => {
                    if (resp.error !== undefined) {
                        alert("Gagal otorisasi Google API");
                        return;
                    }
                    accessToken = resp.access_token;
                    updateAuthStatus(true);
                    await executeDriveSync();
                };
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                await executeDriveSync();
            }
        }

        async function executeDriveSync() {
            const btn = document.getElementById('btnSyncDrive');
            if (!btn) return;
            const originalText = btn.innerHTML;
            
            btn.innerHTML = `<div class="loader !w-3.5 !h-3.5 !border-2 !border-indigo-100 !border-t-transparent mr-1"></div> Syncing...`;
            btn.disabled = true;

            try {
                const query = encodeURIComponent(`'${DRIVE_FOLDER_ID}' in parents and trashed=false`);
                const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=${query}&fields=files(id,name,thumbnailLink)&pageSize=1000`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                handleApiError(response); 

                const data = await response.json();
                if(!response.ok) throw new Error(data.error?.message || "Gagal akses Drive");

                let files = data.files || [];

                files.sort((a, b) => {
                    const numA = parseInt((a.name.match(/_(\d+)\./) || [0,0])[1]);
                    const numB = parseInt((b.name.match(/_(\d+)\./) || [0,0])[1]);
                    return numA - numB;
                });

                localPhotos = {};
                await clearAllPhotosFromDB();

                files.forEach(file => {

        function parseCSV(str) {
            const lines = str.split('\n');
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
            
            return lines.slice(1).map(line => {
                if(!line.trim()) return null;
                const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                
                headers.forEach((header, index) => {
                    let val = values[index] ? values[index].trim().replace(/"/g, '') : '';
                    if (header.includes('sku')) obj.sku = val;
                    else if (header.includes('nama') || header.includes('produk')) obj.nama = val;
                    else if (header.includes('unit')) obj.unit = val;
                    else if (header.includes('merk') || header.includes('brand')) obj.merk = val;
                    else if (header.includes('eceran') || header.includes('harga')) obj.eceran = val;
                    else if (header.includes('stok') || header.includes('stock')) obj.stok = val;
                });
                
                if(!obj.sku) obj.sku = values[0]?.replace(/"/g, '');
                if(!obj.nama) obj.nama = values[1]?.replace(/"/g, '');
                
                return obj;
            }).filter(p => p && p.sku && p.nama);
        }

        function parseTaskCSV(str) {
            const lines = str.split('\n');
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
            const skuIndex = headers.findIndex(h => h.includes('sku'));
            if (skuIndex === -1) return []; 

            const skus = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                if (!line.trim()) continue;
                const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (values[skuIndex]) skus.push(values[skuIndex].trim().replace(/"/g, ''));
            }
            return skus;
        }

        // --- Logika Filter & Pagination ---
        function handleSearch() {
            const searchInput = document.getElementById('searchInput');
            if(!searchInput) return;
            const term = searchInput.value.toLowerCase();
            filteredProductsList = allProducts;
            if (activeTab === 'tasks') {
                filteredProductsList = filteredProductsList.filter(p => dailyTasks.has(p.sku));
            }
            filteredProductsList = filteredProductsList.filter(p => 
                (p.sku && p.sku.toLowerCase().includes(term)) ||
                (p.nama && p.nama.toLowerCase().includes(term)) ||
                (p.merk && p.merk.toLowerCase().includes(term))
            );
            currentPage = 1;
            renderPage(); 
        }

        function renderPage() {
            const totalItems = filteredProductsList.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, totalItems);
            const productsToRender = filteredProductsList.slice(startIndex, endIndex);
            
            const startDisplay = totalItems === 0 ? 0 : startIndex + 1;
            
            const prodCountInfo = document.getElementById('productCountInfo');
            const pInfo = document.getElementById('pageInfo');
            const btnPrev = document.getElementById('btnPrevPage');
            const btnNext = document.getElementById('btnNextPage');
            
            if (prodCountInfo) prodCountInfo.innerText = `Menampilkan ${startDisplay} - ${endIndex} dari ${totalItems}`;
            if (pInfo) pInfo.innerText = `Halaman ${currentPage} / ${totalPages}`;
            if (btnPrev) btnPrev.disabled = (currentPage === 1);
            if (btnNext) btnNext.disabled = (currentPage === totalPages);

            renderTable(productsToRender);
            if (currentPage > 1) {
               const searchInput = document.getElementById('searchInput');
               if(searchInput) searchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function changePage(delta) {
            currentPage += delta;

        }

        // AUTO COMPRESSOR GAMBAR UNTUK HP
        function compressImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(img.src);
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, 'image/jpeg', quality);
                };
                img.onerror = (error) => reject(error);
            });
        }

        async function handlePhotoCapture(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;

            const remainingSlots = MAX_PHOTOS - currentActivePhotos.length;
            const filesToAdd = files.slice(0, remainingSlots);

            if (files.length > remainingSlots) {
                alert(`Anda hanya dapat menambahkan ${remainingSlots} foto lagi untuk produk ini.`);
            }

            const countLabel = document.getElementById('photoCountLabel');
            if(countLabel) countLabel.innerText = "Mengompres...";

            for (let file of filesToAdd) {
                try {
                    const compressedBlob = await compressImage(file, 1080, 1080, 0.8);
                    currentActivePhotos.push(URL.createObjectURL(compressedBlob));
                } catch (e) {
                    console.error("Gagal kompresi, pakai foto asli:", e);
                    currentActivePhotos.push(URL.createObjectURL(file));
                }
            }

            renderModalPreviews();
            event.target.value = '';
        }

        // Hapus Foto Langsung dari Google Drive
        async function removeActivePhoto(index) {
            const photoUrl = currentActivePhotos[index];

            if (photoUrl.startsWith('blob:')) {
                currentActivePhotos.splice(index, 1);
                renderModalPreviews();
                return;
            }

            if (!accessToken) {
                alert("Silakan 'Login Drive' di bagian atas layar terlebih dahulu untuk menghapus foto yang sudah tersimpan di cloud.");
                return;
            }

            const confirmDelete = confirm("Hapus foto ini SECARA PERMANEN dari Google Drive?");
            if (!confirmDelete) return;

            const trashBtn = document.getElementById(`trash-btn-${index}`);
            if(trashBtn) trashBtn.innerHTML = `<div class="loader !w-4 !h-4 !border-2 !border-white !border-t-transparent"></div>`;

            try {
                const query = encodeURIComponent(`'${DRIVE_FOLDER_ID}' in parents and name contains '${currentActiveSku}' and trashed=false`);
                const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=${query}&fields=files(id,name)&orderBy=name`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                handleApiError(response);

                const data = await response.json();
                if(!response.ok) throw new Error(data.error?.message || "Gagal akses Drive");
                
                let files = data.files || [];
                files = files.filter(f => f.name.startsWith(`${currentActiveSku}_`) || f.name === `${currentActiveSku}.png`);
                
                files.sort((a, b) => {
                    const numA = parseInt((a.name.match(/_(\d+)\./) || [0,0])[1]);
                    const numB = parseInt((b.name.match(/_(\d+)\./) || [0,0])[1]);
                    return numA - numB;
                });

                let oldPhotoIndex = 0;
                for (let i = 0; i < index; i++) {
                    if (!currentActivePhotos[i].startsWith('blob:')) {
                        oldPhotoIndex++;
                    }
                }

                if (files[oldPhotoIndex]) {
                    const fileId = files[oldPhotoIndex].id;
                    const delRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    
                    handleApiError(delRes);

                    if(!delRes.ok) {
                        const errData = await delRes.json();
                        throw new Error(errData.error?.message || "Google Drive menolak penghapusan.");
                    }
                }

                currentActivePhotos.splice(index, 1);
                
                if (currentActivePhotos.length > 0) {
                    localPhotos[currentActiveSku] = [...currentActivePhotos];
                    await savePhotosToDB(currentActiveSku, currentActivePhotos);
                } else {
                    delete localPhotos[currentActiveSku];
                    await deletePhotosFromDB(currentActiveSku);
                }

                renderModalPreviews();
                renderPage(); 

            } catch (error) {
                console.error("Delete Error:", error);
                alert("Gagal menghapus foto: " + error.message);
                renderModalPreviews(); 
            }
        }

            let newPhotosCount = currentActivePhotos.filter(url => url.startsWith('blob:')).length;

                } else {
                    if(btnTambahMini) btnTambahMini.classList.remove('hidden');
                    if(btnOpenCameraBig) btnOpenCameraBig.classList.add('hidden');
                }

                if(btnUpload) {
                    if (newPhotosCount > 0) {
                        btnUpload.disabled = false;
                        btnUpload.innerHTML = `<i data-lucide="upload-cloud" class="w-5 h-5"></i> Simpan ${newPhotosCount} Foto Baru`;
                    } else {
                        btnUpload.disabled = true;
                        btnUpload.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i> Semua Tersimpan`;
                    }
                }

                if(grid) {
                    grid.innerHTML = currentActivePhotos.map((url, i) => `
                        <div class="relative aspect-square rounded-2xl overflow-hidden border border-slate-200 bg-slate-100 group shadow-sm">
                            <img src="${url}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-[2px]">
                                <button id="trash-btn-${i}" onclick="removeActivePhoto(${i})" class="bg-rose-500 text-white p-3 rounded-full hover:bg-rose-600 transition-transform hover:scale-110 shadow-lg">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <div class="absolute bottom-1 left-1 bg-black/70 text-white text-[10px] px-2 py-0.5 rounded-lg font-mono font-bold">${i+1}</div>
                            ${url.startsWith('blob:') ? '<div class="absolute top-1 right-1 bg-emerald-500 text-white text-[9px] px-2 py-0.5 rounded-lg font-bold shadow-sm">BARU</div>' : ''}
                        </div>
                    `).join('');
                }
                
            } else {
                if(emptyState) emptyState.classList.remove('hidden');
                if(deleteInfo) deleteInfo.classList.add('hidden');
                if(grid) grid.classList.add('hidden');
                if(btnTambahMini) btnTambahMini.classList.add('hidden');
                if(btnOpenCameraBig) btnOpenCameraBig.classList.remove('hidden');
                
                if(btnUpload) {
                    btnUpload.disabled = true;
                    btnUpload.innerHTML = `<i data-lucide="upload-cloud" class="w-5 h-5"></i> Simpan Foto`;
                }
            }

            lucide.createIcons();
        }

        function blobToBase64(blob) {
            return new Promise((resolve, _) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        }

        // --- Eksekusi Menyimpan Tugas ke Google Sheets ---
        async function syncTasksToCloud() {
            if (!accessToken) {
                tokenClient.callback = async (resp) => {
                    if (resp.error !== undefined) {
                        alert("Gagal otorisasi Google API");
                        return;
                    }
                    accessToken = resp.access_token;
                    updateAuthStatus(true);
                    await executeSyncTasks();
                };
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                await executeSyncTasks();
            }
        }

        async function executeSyncTasks() {
            const btn = document.getElementById('btnSyncTasks');
            if(!btn) return;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<div class="loader !w-4 !h-4 !border-2 !border-white !border-t-transparent mr-2"></div> Wait...`;
            btn.disabled = true;

            try {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${TASK_SHEET_ID}/values/A:Z:clear`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                const tasksArray = Array.from(dailyTasks);
                const values = [['SKU'], ...tasksArray.map(sku => [sku])];

                const body = {
                    range: 'A1',
                    majorDimension: 'ROWS',
                    values: values
                };

                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${TASK_SHEET_ID}/values/A1?valueInputOption=USER_ENTERED`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                handleApiError(response);

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error.message || "Gagal menyimpan ke Spreadsheet");
                }

                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Tersimpan`;
                setTimeout(() => {
                    if(btn) {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }
                    lucide.createIcons();
                }, 2000);

            } catch (error) {
                console.error("Sync Error:", error);
                alert("Gagal menyimpan ke Spreadsheet: " + error.message);
                if(btn) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }
            lucide.createIcons();
        }

        // --- Eksekusi Upload ke Google Drive via API Langsung ---
        async function executeUploadDirect() {
            const btn = document.getElementById('btnUpload');
            if(!btn) return;
            const originalText = btn.innerHTML;
            
            btn.innerHTML = `<div class="loader !w-5 !h-5 !border-2 !border-white !border-t-transparent mr-2"></div> Uploading...`;
            btn.disabled = true;

            try {
                if (currentActivePhotos.length > 0) {
                    let base64Photos = [];
                    let newPhotosToUpload = [];

                    for (let i = 0; i < currentActivePhotos.length; i++) {
                        if (!currentActivePhotos[i].startsWith('blob:')) {
                            base64Photos.push(currentActivePhotos[i]);
                        } else {
                            newPhotosToUpload.push(currentActivePhotos[i]);
                        }
                    }

                    if (newPhotosToUpload.length > 0) {
                        const query = encodeURIComponent(`'${DRIVE_FOLDER_ID}' in parents and name contains '${currentActiveSku}' and trashed=false`);
                        const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${query}&fields=files(name)`, {
                            headers: { 'Authorization': `Bearer ${accessToken}` }
                        });
                        
                        handleApiError(driveRes);

                        const driveData = await driveRes.json();
                        if(!driveRes.ok) {
                            throw new Error(driveData.error?.message || "Gagal membaca isi folder Drive");
                        }

                        const driveFiles = driveData.files || [];
                        const exactFiles = driveFiles.filter(f => f.name.startsWith(`${currentActiveSku}_`) || f.name === `${currentActiveSku}.png`);
                        
                        let maxIdx = 0;
                        exactFiles.forEach(f => {
                            const m = f.name.match(/_(\d+)\.[a-zA-Z]+$/);
                            if(m && parseInt(m[1]) > maxIdx) maxIdx = parseInt(m[1]);
                            if(f.name === `${currentActiveSku}.png` && maxIdx === 0) maxIdx = 1;
                        });

                        for (let i = 0; i < newPhotosToUpload.length; i++) {
                            const photoUrl = newPhotosToUpload[i];
                            maxIdx++; 
                            
                            const response = await fetch(photoUrl);
                            const blob = await response.blob();
                            let blobType = blob.type || 'image/jpeg'; 
                            const base64data = await blobToBase64(blob);
                            base64Photos.push(base64data); 

                            const metadata = {
                                name: `${currentActiveSku}_${maxIdx}.jpeg`, 
                                parents: [DRIVE_FOLDER_ID]
                            };

                            const boundary = '-------314159265358979323846';
                            const delimiter = "\r\n--" + boundary + "\r\n";
                            const close_delim = "\r\n--" + boundary + "--";
                            
                            const multipartRequestBody =
                                delimiter +
                                'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                                JSON.stringify(metadata) +
                                delimiter +
                                'Content-Type: ' + blobType + '\r\n' +
                                'Content-Transfer-Encoding: base64\r\n\r\n' +
                                base64data.split(',')[1] +
                                close_delim;

                            const uploadResponse = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true', {
                                method: 'POST',
                                headers: {
                                    'Authorization': `Bearer ${accessToken}`,
                                    'Content-Type': 'multipart/related; boundary=' + boundary
                                },
                                body: multipartRequestBody
                            });

                            handleApiError(uploadResponse);

                            if(!uploadResponse.ok) {
                                const errData = await uploadResponse.json();
                                throw new Error(errData.error?.message || "API Google Drive Menolak Upload");
                            }
                        }
                    }
                    
                    localPhotos[currentActiveSku] = [...base64Photos];
                    await savePhotosToDB(currentActiveSku, base64Photos);
                }
                
                if(btn) btn.innerHTML = originalText;
                const successMsg = document.getElementById('successMessage');
                if(successMsg) successMsg.classList.remove('hidden');
                
                renderPage(); 
                
                setTimeout(() => {
                    closeModal();
                }, 1500);

            } catch (error) {
                console.error("Error Upload:", error);
                alert("Gagal mengunggah: " + error.message);
                if(btn) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }
        }
    </script>
